<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h4 class="mb-0">Formulir Peminjaman Lab</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/reservasi/simpan}" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Tanggal Kegiatan</label>
                                <input type="date" class="form-control" name="tanggal_kegiatan" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Jam Mulai</label>
                                    <input type="time" class="form-control" name="waktu_mulai" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Jam Selesai</label>
                                    <input type="time" class="form-control" name="waktu_selesai" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Tujuan Kegiatan</label>
                                <textarea class="form-control" name="tujuan_kegiatan" rows="3" placeholder="Contoh: Praktikum Pemrograman Web"></textarea>
                            </div>
                            <hr>
                            <button type="submit" class="btn btn-success w-100">Ajukan Reservasi</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
